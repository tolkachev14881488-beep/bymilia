name: CMS Publish

on:
  repository_dispatch:
    types: [cms_publish]

permissions:
  contents: write

concurrency:
  group: cms-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply CMS payload
        env:
          CMS_KEY: e0a783f30b410151f878ff4fdfb32c218d2cac201f493ce7
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node .github/scripts/cms-apply-payload.mjs

      - name: Commit and push
        run: |
          git config user.name "By Milia CMS"
          git config user.email "bymilia@users.noreply.github.com"
          git add data/site.json data/products.json assets/products || true
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "CMS: publish from admin"
          git push
