<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Корзина — By Milia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="container cart-layout">
    <div>
      <h1>Корзина</h1>
      <div class="cart-lines" id="cart-lines"></div>
    </div>
    <aside>
      <div class="cart-summary" id="cart-summary" hidden></div>
      <form class="checkout-form cart-summary" id="checkout-form" style="margin-top:1rem" hidden>
        <h2 style="font-size:1.1rem;font-family:var(--font)">Оформление заявки</h2>
        <p style="font-size:0.88rem;color:var(--ink-muted);margin:0 0 0.5rem">Менеджер свяжется для подтверждения и оплаты</p>
        <label>ФИО <input name="name" required autocomplete="name"></label>
        <label>Телефон <input name="phone" type="tel" required autocomplete="tel" placeholder="+375 …"></label>
        <label>Email <input name="email" type="email" autocomplete="email"></label>
        <label>Способ доставки <select name="delivery" required></select></label>
        <label>Адрес / ПВЗ / комментарий к адресу <input name="address" placeholder="Город, улица, индекс…"></label>
        <label>Комментарий к заказу <textarea name="comment"></textarea></label>
        <button class="btn btn-primary btn-lg btn-glow btn-block" type="submit">Отправить в WhatsApp и на почту</button>
      </form>
    </aside>
  </main>
  <div id="site-footer"></div>
  <script type="module">
    import { initLayout } from './js/layout.js';
    import { initCartPage } from './js/pages.js';
    initLayout();
    initCartPage();
  </script>
</body>
</html>
