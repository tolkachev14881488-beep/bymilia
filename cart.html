<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Корзина и оформление заказа — By Milia</title>
  <meta name="description" content="Оформите заказ сапожек By Milia: доставка по Беларуси, подтверждение менеджером в WhatsApp.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://tolkachev14881488-beep.github.io/bymilia/cart.html">
  <meta name="theme-color" content="#ff5500">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=21">
</head>
<body data-site-root=".">
  <div id="site-header"></div>
  <main class="container cart-layout">
    <div class="cart-main">
      <div class="cart-head">
        <h1>Корзина</h1>
        <p class="cart-head-lead" id="cart-head-lead" hidden></p>
      </div>
      <div class="cart-lines" id="cart-lines"></div>
    </div>
    <aside class="cart-aside" id="cart-aside" hidden>
      <div class="cart-summary" id="cart-summary"></div>
      <form class="checkout-form" id="checkout-form">
        <h2 class="checkout-form-title">Оформление заказа</h2>
        <p class="checkout-form-lead">Остался один шаг — отправьте заявку, менеджер ответит в WhatsApp</p>
        <label>ФИО <input name="name" required autocomplete="name"></label>
        <label>Телефон <input name="phone" type="tel" required autocomplete="tel" placeholder="+375 …"></label>
        <label>Email <input name="email" type="email" required autocomplete="email" placeholder="you@example.com"></label>
        <label>Способ доставки <select name="delivery" required></select></label>
        <label>Адрес / ПВЗ / комментарий к адресу <input name="address" placeholder="Город, улица, индекс…"></label>
        <label>Комментарий к заказу <textarea name="comment"></textarea></label>
        <button class="btn btn-primary btn-lg btn-glow btn-block" type="submit">Оформить заказ в WhatsApp</button>
        <p class="checkout-form-note">Нажимая кнопку, вы соглашаетесь на обработку данных для связи по заказу</p>
      </form>
    </aside>
  </main>
  <div id="site-footer"></div>
  <script type="module">
    import { boot } from './js/init.js';
    import { initCartPage } from './js/pages.js';
    boot(() => initCartPage());
  </script>
</body>
</html>
