  <meta name="description" content="Оформите заказ сапожек By Milia: доставка по Беларуси, заявка с сайта.">

<body class="page-cart" data-site-root=".">
  <div id="site-header"></div>
  <main class="container cart-layout">
    <div class="cart-main">
      <div class="cart-head">
        <h1>Корзина</h1>
        <p class="cart-head-lead" id="cart-head-lead" hidden></p>
      </div>
      <div class="cart-lines" id="cart-lines"></div>
    </div>
    <aside class="cart-aside" id="cart-aside" hidden>
      <div class="cart-summary" id="cart-summary"></div>
      <form class="checkout-form" id="checkout-form">
        <h2 class="checkout-form-title">Оформление заказа</h2>
        <p class="checkout-form-lead">Остался один шаг — отправьте заявку</p>
        <label>ФИО <input name="name" required autocomplete="name"></label>
        <label>Телефон <input name="phone" type="tel" required autocomplete="tel" placeholder="+375 …"></label>
        <label>Email <input name="email" type="email" required autocomplete="email" placeholder="you@example.com"></label>
        <label>Способ доставки <select name="delivery" required></select></label>
        <label>Адрес / ПВЗ / комментарий к адресу <input name="address" placeholder="Город, улица, индекс…"></label>
        <label>Комментарий к заказу <textarea name="comment"></textarea></label>
        <button class="btn btn-primary btn-lg btn-glow btn-block" type="submit">Отправить заявку</button>
        <p class="checkout-form-note">Нажимая кнопку, вы соглашаетесь на обработку данных для связи по заказу</p>
      </form>
    </aside>
  </main>
  <div class="cart-mobile-bar" id="cart-mobile-bar" hidden>
    <div class="cart-mobile-bar-inner">
      <div class="cart-mobile-bar-total">
        <span class="cart-mobile-bar-label">Итого</span>
        <strong class="cart-mobile-bar-sum" id="cart-mobile-sum"></strong>
      </div>
      <a class="btn btn-primary btn-glow cart-mobile-bar-btn" href="#checkout-form">Отправить заявку</a>
    </div>
  </div>
  <div id="site-footer"></div>
  <script type="module">
    import { boot } from './js/init.js';
    import { initCartPage } from './js/pages.js';
    boot(() => initCartPage());

</html>
