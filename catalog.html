<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Каталог сапожек By Milia — 4 расцветки, размеры 25–42 см</title>
  <meta name="description" content="Купить сапожки для разогрева стоп By Milia: чёрный, тропический и яркий принт, классика. Цены, фото, заказ с доставкой по Беларуси.">
  <link rel="canonical" href="https://by-milia.by/catalog.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=32">
  <meta name="theme-color" content="#ff5500">
</head>
<body class="page-catalog" data-site-root=".">
  <div class="grain" aria-hidden="true"></div>
  <div id="site-header"></div>
  <main>
    <div class="page-hero">
      <div class="container reveal is-visible">
        <span class="eyebrow">Коллекция By Milia</span>
        <h1>Каталог сапожек By Milia</h1>
        <p class="lead">Четыре расцветки · размеры 25–42 · заявка до 13:00 — отправка в тот же день</p>
        <a class="btn btn-primary btn-lg btn-glow catalog-cart-btn" href="cart.html" id="catalog-cart-btn" hidden>Корзина</a>
      </div>
    </div>
    <section class="section section-catalog">
      <div class="container product-grid" id="catalog-grid"></div>
      <div class="container catalog-manager-block" id="catalog-manager"></div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script type="module">
    import { boot } from './js/init.js';
    import { initCatalogSeo, renderProductGrid } from './js/pages.js';
    boot(() => {
      initCatalogSeo();
      renderProductGrid(document.getElementById('catalog-grid'));
    });
  </script>
</body>
</html>
